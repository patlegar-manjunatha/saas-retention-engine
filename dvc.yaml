stages:
  data_ingestion:
    cmd: python -m src.components.data_ingestion
    deps:
      - src/components/data_ingestion.py
      - src/storage/minio_client.py
      - src/helpers/load_save.py
      - config/training.yaml
    outs:
      - data/raw/customer_churn.csv
      - artifacts/reports/data_ingestion_profile.json

  data_transformation:
    cmd: python -m src.components.data_transformation
    deps:
      - src/components/data_transformation.py
      - config/training.yaml
      - data/raw/customer_churn.csv
    outs:
      - data/preprocessed/train.csv
      - data/preprocessed/test.csv
      - data/transformed/train_data.npz
      - data/transformed/test_data.npz
      - artifacts/preprocessing/data_preprocessor.joblib
