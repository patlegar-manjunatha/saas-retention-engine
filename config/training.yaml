DataIngestion:
  bucket_name: saas-retention-engine
  object_key: raw/customer_churn.csv
  local_path: data/raw/customer_churn.csv
  output_profile_path : "artifacts/reports/data_ingestion_profile.json"

DataTransformation: 
  bucket_name: "saas-retention-engine"
  schema_path: "config/schema.yaml"
  data_path: "data/raw/customer_churn.csv"
  output_data_path: 
    preprocessed: "data/preprocessed"
    transformed: "data/transformed"
  output_profile_path:                           
    train: "artifacts/reports/train_profile.json" 
    test: "artifacts/reports/test_profile.json"
  artifacts: 
    preprocessor: "artifacts/preprocessing/data_preprocessor.joblib"