DataIngestion:
  bucket_name: saas-retention-engine
  object_key: raw/customer_churn.csv
  local_path: data/raw/customer_churn.csv
  output_profile_path : "artifacts/reports/data_ingestion_profile.json"

DataTransformation: 
  bucket_name: "saas-retention-engine"
  schema_path: "config/schema.yaml"
  data_path: "data/raw/customer_churn.csv"
  output_data_path: 
    preprocessed: "data/preprocessed"
    transformed: "data/transformed"
  output_profile_path:                           
    train: "artifacts/reports/train_profile.json" 
    test: "artifacts/reports/test_profile.json"
  artifacts: 
    preprocessor: "artifacts/preprocessing/data_preprocessor.joblib"

ModelTraining:
  bucket_name: "saas-retention-engine"
  data_path: "data/transformed/train_data.npz"
  selected_model: "RandomForest"    # Switch to "XGBoost" or "LogisticRegression" here!
  n_trials: 20                      # How many Bayesian guesses Optuna should make
  optuna_scoring: "f1"              # The metric to optimize during cross-validation
  experiment_name: "SaaS-Retention-Training"
  output_paths:
    model: "artifacts/models/trained_model.joblib"
    optuna_report: "artifacts/reports/optuna_study.json"